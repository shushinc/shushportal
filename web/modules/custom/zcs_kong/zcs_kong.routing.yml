zcs_kong.create_key:
  path: 'create-key'
  defaults:
    _title: 'Create Client Credentials'
    _form: 'Drupal\zcs_kong\Form\CreatekeyForm'
  requirements:
    _custom_access: '\Drupal\zcs_kong\Form\CreatekeyForm::access'

zcs_kong.app_list:
  path: '/client/apps'
  defaults:
    _title: 'Client Credentials'
    _form: 'Drupal\zcs_kong\Form\AppListForm'
  requirements:
    _permission: 'access content' 

zcs_kong.delete_key:
  path: '/key/{id}/delete'
  defaults:
    _controller: '\Drupal\zcs_kong\Controller\DeleteController::deleteKey'
  requirements:
     _custom_access: '\Drupal\zcs_kong\Controlle  r\DeleteController::access' 

zcs_kong.kong_sync:
  path: '/admin/kong_sync'
  defaults:
    _form: '\Drupal\zcs_kong\Form\SyncAppsForm'
    _title: 'Sync Kong data'
  requirements:
    _permission: 'administer site configuration'

zcs_kong.edit_key:
  path: '/key/{id}/edit'
  defaults:
    _title: 'Update API key'
    _form: 'Drupal\zcs_kong\Form\UpdateKeyForm'
  requirements:
    _custom_access: '\Drupal\zcs_kong\Form\UpdateKeyForm::access'   