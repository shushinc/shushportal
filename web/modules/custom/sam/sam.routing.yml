sam.config:
  path: '/admin/config/people/multi-sso'
  defaults:
    _form: '\Drupal\sam\Form\SamConfigForm'
    _title: 'Multi SSO Configuration'
  requirements:
    _permission: 'administer site configuration'

sam.authenticate:
  path: '/sso/authenticate/{provider}'
  defaults:
    _controller: '\Drupal\sam\Controller\SsoController::authenticate'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: true

sam.callback:
  path: '/sso/callback/{provider}'
  defaults:
    _controller: '\Drupal\sam\Controller\SsoController::callback'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: true
sam.client_auth_screen:
  path: '/sso/authenticate/client'
  defaults:
    _form: '\Drupal\sam\Form\ClientPasswordForm'
    _title: 'Log in'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: true

sam.sso_verify_invitation:
  path: '/sso/invitation/{token}'
  defaults:
    _controller: '\Drupal\sam\Controller\SsoController::verifyInvitation'
    _title: 'Moriarty SSO Authentication'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: true