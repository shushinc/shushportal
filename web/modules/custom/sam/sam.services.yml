services:
  sam.provider_manager:
    class: Drupal\sam\SsoProviderManager
    parent: default_plugin_manager
    arguments: 
      - 'Plugin/SsoProvider'
      - '@container.namespaces'
      - '@module_handler'
      - 'Drupal\sam\Plugin\SsoProvider\SsoProviderInterface'
  sam.identity_manager:
    class: Drupal\sam\Service\IdentityManager
    arguments: 
      - '@entity_type.manager'
      - '@config.factory'
      - '@database'
  sam.state_token:
    class: Drupal\sam\Security\SamStateTokenService
    arguments:
      - '@session'
  sam.login_flow_manager:
    class: Drupal\sam\Service\LoginFlowManager
    arguments:
      - '@config.factory'
      - '@logger.factory'
      - '@request_stack'
      - '@session'
      - '@sam.identity_manager'
  sam.oidc_discovery:
    class: Drupal\sam\Service\OidcDiscoveryService
    arguments:
      - '@http_client_factory'
      - '@logger.factory'