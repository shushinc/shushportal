zcs_api_attributes.api_access_token.list:
  path: '/admin/config/services/api-access-tokens'
  defaults:
    _controller: '\Drupal\zcs_api_attributes\Controller\ApiAccessTokenController::listTokens'
    _title: 'API Access Tokens'
  requirements:
    _permission: 'view api access tokens'
  options:
    _admin_route: TRUE

zcs_api_attributes.api_access_token.add:
  path: '/admin/config/services/api-access-tokens/add'
  defaults:
    _form: '\Drupal\zcs_api_attributes\Form\ApiAccessTokenForm'
    _title: 'Add API Access Token'
  requirements:
    _permission: 'generate api access tokens'
  options:
    _admin_route: TRUE

zcs_api_attributes.api_access_token.view:
  path: '/admin/config/services/api-access-tokens/{token_id}'
  defaults:
    _controller: '\Drupal\zcs_api_attributes\Controller\ApiAccessTokenController::viewToken'
    _title: 'View API Access Token'
  requirements:
    _permission: 'view api access tokens'
    token_id: \d+
  options:
    _admin_route: TRUE

zcs_api_attributes.api_access_token.regenerate:
  path: '/admin/config/services/api-access-tokens/{token_id}/regenerate'
  defaults:
    _form: '\Drupal\zcs_api_attributes\Form\ApiAccessTokenRegenerateConfirmForm'
    _title: 'Regenerate API Access Token'
  requirements:
    _permission: 'regenerate api access tokens'
    token_id: \d+
  options:
    _admin_route: TRUE

zcs_api_attributes.api_access_token.enable:
  path: '/admin/config/services/api-access-tokens/{token_id}/enable'
  defaults:
    _form: '\Drupal\zcs_api_attributes\Form\ApiAccessTokenEnableConfirmForm'
    _title: 'Enable API Access Token'
  requirements:
    _permission: 'administer api access tokens'
    token_id: \d+
  options:
    _admin_route: TRUE

zcs_api_attributes.api_access_token.disable:
  path: '/admin/config/services/api-access-tokens/{token_id}/disable'
  defaults:
    _form: '\Drupal\zcs_api_attributes\Form\ApiAccessTokenDisableConfirmForm'
    _title: 'Disable API Access Token'
  requirements:
    _permission: 'administer api access tokens'
    token_id: \d+
  options:
    _admin_route: TRUE

zcs_api_attributes.api_access_token.delete:
  path: '/admin/config/services/api-access-tokens/{token_id}/delete'
  defaults:
    _form: '\Drupal\zcs_api_attributes\Form\ApiAccessTokenDeleteConfirmForm'
    _title: 'Delete API Access Token'
  requirements:
    _permission: 'delete api access tokens'
    token_id: \d+
  options:
    _admin_route: TRUE
