zcs_api_attributes.attribute.page:
  path: "/carrier/api-attribute-status"
  defaults:
    _controller: '\Drupal\zcs_api_attributes\Controller\AttributesPageController::attributesPage'
    _title: "API Attribute Status"
  requirements:
    _custom_access: '\Drupal\zcs_api_attributes\Controller\AttributesPageController::access'
  options:
    no_cache: true

zcs_api_attributes.edit_attribute:
  path: "/api-attribute/{id}/edit"
  defaults:
    _title: "Update API Attribute Status"
    _form: 'Drupal\zcs_api_attributes\Form\UpdateApiAttributeForm'
  requirements:
    _custom_access: '\Drupal\zcs_api_attributes\Form\UpdateApiAttributeForm::access'

zcs_api_attributes.change_network_authentication_pricing:
  path: "/change-network-authentication-pricing"
  defaults:
    _controller: '\Drupal\zcs_api_attributes\Controller\ChangeNetworkAuthenticationPricing::pricingPage'
    _title: "Change Network Authentication Pricing"
  requirements:
    _permission: "access content"
  options:
    no_cache: true

zcs_api_attributes.change_network_authentication_pricing_update:
  path: "/change-network-authentication-pricing/{id}/edit"
  defaults:
    _title: "Update Change Network Authentication Pricing"
    _form: 'Drupal\zcs_api_attributes\Form\UpdateChangeNetworkAuthenticationPricing'
  requirements:
    _custom_access: '\Drupal\zcs_api_attributes\Form\UpdateChangeNetworkAuthenticationPricing:access'

zcs_api_attributes.pricing_history:
  path: "/pricing/history"
  defaults:
    _controller: '\Drupal\zcs_api_attributes\Controller\PricingOverTime::pricingPage'
    _title: "Pricing History"
  requirements:
    _custom_access: '\Drupal\zcs_api_attributes\Controller\PricingOverTime::access'
  options:
    no_cache: true
zcs_api_attributes.rate_sheet_list:
  path: "/pricing/rate-sheet-list"
  defaults:
    _controller: '\Drupal\zcs_api_attributes\Controller\RateSheetController::rateSheetList'
    _title: "Rate Sheet List"
  requirements:
    _permission: "list rate sheets"
  options:
    no_cache: true

zcs_api_attributes.client_rate_sheet_approval:
  path: "/client/rate-sheet-approval"
  defaults:
    _controller: '\Drupal\zcs_api_attributes\Controller\ClientRateSheetApprovalController::clientRateSheetList'
    _title: "Client Rate Sheet Approval"
  requirements:
    _permission: 'list client rate sheets'
  options:
    no_cache: true

zcs_api_attributes.new_rate_sheet.review:
  path: "/pricing/new-rate-sheet/review/{id}"
  defaults:
    _form: '\Drupal\zcs_api_attributes\Form\NewRateSheetReviewForm'
    _title: "Rate Sheet Review"
    id: 0
  requirements:
    _permission: 'access content'
    _role: "finance_admin + administrator + financial_rate_sheet_approval_level_1 + financial_rate_sheet_approval_level_2"
    id: \d+
  options:
    no_cache: "TRUE"
    _admin_route: TRUE

zcs_api_attributes.create_rate_sheet:
  path: "/create-rate-sheet"
  defaults:
    _form: '\Drupal\zcs_api_attributes\Form\CreateRateSheetForm'
    _title: "Add New Rate Sheet"
  requirements:
    _permission: "create rate sheet"
  options:
    no_cache: true

zcs_api_attributes.rate_sheet.edit:
  path: "/pricing/rate-sheet/edit/{id}"
  defaults:
    _form: '\Drupal\zcs_api_attributes\Form\EditRateSheetForm'
    _title: "Edit Rate Sheet"
    id: 0
  requirements:
    _permission: 'access content'
    id: \d+
  options:
    no_cache: true
zcs_api_attributes.demand_partner_discountes_or_different_pricing:
  path: "/demand_partner_discounts_or_different_pricing"
  defaults:
    _controller: '\Drupal\zcs_api_attributes\Controller\DemandPartnerDiscountsOrDifferentPricing::pricingPage'
    _title: "Demand Partner Discounts or Different Pricing"
  requirements:
    _permission: "access content"
  options:
    no_cache: true

zcs_api_attributes.rate_sheet:
  path: "/rate-sheet-price"
  defaults:
    _form: '\Drupal\zcs_api_attributes\Form\PriceRateSheet'
    _title: "Proposed API Pricing"
  requirements:
    _role: "finance_admin + administrator"
  options:
    no_cache: true

zcs_api_attributes.api_attribute_sheet:
  path: "/carrier/create-api-attribute-sheet"
  defaults:
    _form: '\Drupal\zcs_api_attributes\Form\ApiAttributeSheet'
    _title: "Update API Attributes"
  requirements:
    _role: "api_attribute_admin + administrator"
  options:
    no_cache: true

zcs_api_attributes.rate_sheet.approval:
  path: "/pricing/review"
  defaults:
    _controller: '\Drupal\zcs_api_attributes\Controller\PricingOverTime::attributeApprovals'
    _title: "Pricing Review"
  requirements:
    _role: "finance_admin + administrator + financial_rate_sheet_approval_level_1 + financial_rate_sheet_approval_level_2"
  options:
    no_cache: "TRUE"

zcs_api_attributes.api_attribute_sheet.approval:
