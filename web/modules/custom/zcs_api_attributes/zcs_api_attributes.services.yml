services:
  zcs_api_attributes.twig.CustomTwig:
    class: Drupal\zcs_api_attributes\Twig\RateSheetTwig
    tags:
      - { name: twig.extension }
  zcs_api_attributes.propose_price_ratesheet:
    class: Drupal\zcs_api_attributes\Services\RetailMarkupPriceSheet
    arguments: ['@database']
  zcs_api_attributes.discount_sheet:
    class: Drupal\zcs_api_attributes\Services\DiscountPriceSheet
    arguments: ['@database']
  logger.channel.zcs_api_attributes:
    parent: logger.channel_base
    arguments: ['zcs_api_attributes']
  zcs_api_attributes.rate_sheet_service:
    class: Drupal\zcs_api_attributes\Service\RateSheetService
    arguments:
      - '@database'
      - '@entity_type.manager'
      - '@current_user'
      - '@logger.channel.zcs_api_attributes'
  zcs_api_attributes.rate_sheet_approval_access:
    class: Drupal\zcs_api_attributes\Access\RateSheetApprovalAccessCheck
  zcs_api_attributes.twig.number_format:
    class: Drupal\zcs_api_attributes\TwigExtension\NumberFormatExtension
    tags:
      - { name: twig.extension }
